[build]
  command = "pnpm install && pnpm run build:client"
  publish = "dist"
  # Skip secrets scanning for documentation files with false positives
  # Environment variables from Netlify UI are automatically available to the build
  # The VITE_ prefixed variables are picked up by Vite during build time
  environment = { SECRETS_SCAN_OMIT_PATHS = ".dockerignore,AGENTS.md" }

# Cache control for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Note: SPA routing is handled by _redirects file
